<svg viewBox="0 0 1300 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hyper-title hyper-desc" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="hyper-title">Urinuntersuchung bei Hypernatriämie – Diagnostischer Algorithmus</title>
  <desc id="hyper-desc">Diagnostischer Algorithmus zur Ursachenklärung einer Hypernatriämie über die Urinosmolalität. Drei Hauptpfade: ≤800 mosmol/kg deutet auf renalen Wasserverlust, ≥800 mosmol/kg auf extrarenalen Wasserverlust mit weiterer Differenzierung über das Urin-Natrium, ≥1000 mosmol/kg typischerweise nach Gabe osmotischer Diuretika.</desc>

  <!-- Background -->
  <rect width="1300" height="800" fill="#fafafa"/>

  <!-- Header -->
  <text x="650" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">Urinuntersuchung bei Hypernatriämie</text>
  <text x="650" y="80" text-anchor="middle" font-size="14" fill="#64748b">Einmalurin ausreichend · Urinosmolalität und Urin-Natriumkonzentration bestimmen</text>

  <!-- DECISION 1: Urinosmolalität -->
  <rect x="490" y="118" width="320" height="78" rx="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>
  <text x="650" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#0f766e" letter-spacing="2">SCHRITT 1</text>
  <text x="650" y="178" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Urinosmolalität?</text>

  <!-- Connectors decision 1 → pills -->
  <line x1="650" y1="196" x2="650" y2="222" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="200" y1="222" x2="1100" y2="222" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="200" y1="222" x2="200" y2="248" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="650" y1="222" x2="650" y2="248" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="1100" y1="222" x2="1100" y2="248" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Branch pills -->
  <rect x="100" y="248" width="200" height="46" rx="23" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="200" y="277" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">≤ 800 mosmol/kg</text>

  <rect x="550" y="248" width="200" height="46" rx="23" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="650" y="277" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">≥ 800 mosmol/kg</text>

  <rect x="1000" y="248" width="200" height="46" rx="23" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="1100" y="277" text-anchor="middle" font-size="17" font-weight="700" fill="#991b1b">≥ 1000 mosmol/kg</text>

  <!-- Connectors pills → boxes -->
  <line x1="200" y1="294" x2="200" y2="320" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="650" y1="294" x2="650" y2="320" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="1100" y1="294" x2="1100" y2="320" stroke="#cbd5e1" stroke-width="2"/>

  <!-- LEFT: ≤800 → renaler Wasserverlust -->
  <rect x="80" y="320" width="240" height="160" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="80" y="320" width="240" height="38" rx="14" fill="#f1f5f9"/>
  <line x1="80" y1="358" x2="320" y2="358" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="200" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">I.d.R. Folge:</text>

  <circle cx="98" cy="400" r="4" fill="#475569"/>
  <text x="112" y="406" font-size="17" font-weight="700" fill="#1e293b">Renaler</text>
  <text x="112" y="430" font-size="17" font-weight="700" fill="#1e293b">Wasserverlust</text>

  <!-- CENTER: ≥800 → extrarenal pathway -->
  <rect x="500" y="320" width="300" height="50" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="650" y="340" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af" letter-spacing="1.5">I.D.R. EXTRARENALER WASSERVERLUST</text>
  <text x="650" y="358" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">Weitere Einordnung über Urin-Natrium</text>

  <line x1="650" y1="370" x2="650" y2="394" stroke="#cbd5e1" stroke-width="2"/>

  <!-- DECISION 2: Urin-Natrium -->
  <rect x="510" y="394" width="280" height="64" rx="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>
  <text x="650" y="418" text-anchor="middle" font-size="11" font-weight="700" fill="#0f766e" letter-spacing="2">SCHRITT 2</text>
  <text x="650" y="444" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Urin-Natrium?</text>

  <!-- Connectors decision 2 → sub-pills -->
  <line x1="650" y1="458" x2="650" y2="478" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="540" y1="478" x2="760" y2="478" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="540" y1="478" x2="540" y2="502" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="760" y1="478" x2="760" y2="502" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Sub-pills -->
  <rect x="460" y="502" width="160" height="40" rx="20" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="540" y="528" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">&lt; 30 mmol/L</text>

  <rect x="680" y="502" width="160" height="40" rx="20" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="760" y="528" text-anchor="middle" font-size="14" font-weight="700" fill="#6b21a8">&gt; 60 mmol/L</text>

  <line x1="540" y1="542" x2="540" y2="564" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="760" y1="542" x2="760" y2="564" stroke="#cbd5e1" stroke-width="2"/>

  <!-- <30 box -->
  <rect x="440" y="564" width="200" height="140" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="440" y="564" width="200" height="34" rx="12" fill="#f1f5f9"/>
  <line x1="440" y1="598" x2="640" y2="598" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="540" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Wasserverlust über:</text>

  <circle cx="454" cy="624" r="3" fill="#475569"/>
  <text x="466" y="629" font-size="13" font-weight="600" fill="#1e293b">Perspiratio</text>
  <text x="466" y="645" font-size="13" font-weight="600" fill="#1e293b">insensibilis</text>

  <circle cx="454" cy="678" r="3" fill="#475569"/>
  <text x="466" y="683" font-size="13" font-weight="600" fill="#1e293b">Gastrointestinal</text>

  <!-- >60 box -->
  <rect x="660" y="564" width="200" height="100" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="660" y="564" width="200" height="34" rx="12" fill="#fee2e2"/>
  <line x1="660" y1="598" x2="860" y2="598" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="760" y="586" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Ursache:</text>

  <circle cx="674" cy="626" r="3.5" fill="#dc2626"/>
  <text x="688" y="632" font-size="14" font-weight="700" fill="#7f1d1d">Echte</text>
  <text x="688" y="652" font-size="14" font-weight="700" fill="#7f1d1d">Salzüberladung</text>

  <!-- RIGHT: ≥1000 → osmotische Diuretika -->
  <rect x="980" y="320" width="240" height="160" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="980" y="320" width="240" height="38" rx="14" fill="#f1f5f9"/>
  <line x1="980" y1="358" x2="1220" y2="358" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1100" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">I.d.R. nach Gabe von:</text>

  <circle cx="998" cy="400" r="4" fill="#475569"/>
  <text x="1012" y="406" font-size="17" font-weight="700" fill="#1e293b">Osmotischen</text>
  <text x="1012" y="430" font-size="17" font-weight="700" fill="#1e293b">Diuretika</text>

  <!-- LEGEND -->
  <g transform="translate(80, 730)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#334155">Legende</text>

    <rect x="0" y="14" width="20" height="20" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="28" y="29" font-size="12" fill="#475569">Diagnostischer Schritt</text>

    <rect x="190" y="14" width="20" height="20" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="218" y="29" font-size="12" fill="#475569">Urinosmolalität-Pfad</text>

    <rect x="380" y="14" width="20" height="20" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="408" y="29" font-size="12" fill="#475569">Urin-Natrium-Pfad</text>

    <rect x="560" y="14" width="20" height="20" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <text x="588" y="29" font-size="12" fill="#475569">Pathomechanismus</text>

    <rect x="740" y="14" width="20" height="20" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="768" y="29" font-size="12" fill="#475569">Schlüsseldiagnose</text>
  </g>
</svg>
