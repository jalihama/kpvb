           de:{label:"Noduläres LP-\nHodgkin-L.",full:"Noduläres lymphozytenprädominantes Hodgkin-Lymphom",details:["Sehr selten; LP-Zellen (Popcorn-Zellen): CD20+, CD45+, CD79a+, CD15-, CD30-","Indolenter Verlauf, exzellente Prognose; Histologie obligat zur Diagnosestellung (keine FNA!)","Staging: Ann-Arbor + PET-CT","Stadium IA OHNE Risikofaktoren: ausschliesslich 30 Gy Involved Site Radiatio möglich","Fortgeschritten: Rituximab ± Chemo (R-ABVD oder R-CHOP)","Transformationsrisiko in aggressives B-Zell-Lymphom (~5%)","Leitlinie: DGHO / GHSG"]},
           en:{label:"Nodular LP\nHodgkin L.",full:"Nodular Lymphocyte-Predominant Hodgkin Lymphoma",details:["Very rare; LP cells (popcorn cells): CD20+, CD45+, CD79a+, CD15-, CD30-","Indolent course, excellent prognosis; histology mandatory for diagnosis (no FNA!)","Staging: Ann-Arbor + PET-CT","Stage IA WITHOUT risk factors: 30 Gy involved site radiotherapy alone is sufficient","Advanced: rituximab ± chemo (R-ABVD or R-CHOP)","Risk of transformation to aggressive B-cell lymphoma (~5%)","Guideline: DGHO / GHSG"],pearls_de:["LP-Zellen: CD20+, CD15−, CD30− — GEGENTEIL vom klassischen HL!","Stadium IA ohne Risikofaktoren: 30 Gy Involved Site ALLEIN ausreichend","Keine FNA zur Diagnosestellung — immer Biopsie mit Exstirpation","Transformationsrisiko in aggressives B-Zell-Lymphom: ~5%"],pearls_en:["LP cells: CD20+, CD15−, CD30− — OPPOSITE of classical HL!","Stage IA without risk factors: 30 Gy involved site ALONE is sufficient","No FNA for diagnosis — always excisional biopsy","Transformation risk to aggressive B-cell lymphoma: ~5%"]}},

        {id:"nhl",
         de:{label:"Non-Hodgkin-\nLymphome",full:"Non-Hodgkin-Lymphome — Überblick",details:["Heterogene Gruppe maligner Erkrankungen von B- und T-Zellen des lymphatischen Systems","Historisch: alles, was KEIN Hodgkin-Lymphom ist — heute präzise molekulargenetisch klassifizierbar","Klinische Einteilung: indolent (niedrigmaligne) vs. aggressiv (hochmaligne)","Indolent = langsames Wachstum, niedrige Teilungsrate → zytostatisch schwer angreifbar, oft palliativ","Aggressiv = schnelles Wachstum → hohe Sensitivität auf Chemotherapie, oft kurativ!","Häufigste Ätiologien: EBV, H. pylori, HIV, Immunsuppression, aromatische Kohlenwasserstoffe","Allgemeinsymptome: B-Symptomatik, schmerzlose persistierende Lymphknoten, Splenomegalie","Diagnostik: immer Lymphknotenbiopsie (komplette Exstirpation) — keine FNA!","Standard-Staging: Ann-Arbor + PET-CT / CT"]},
         en:{label:"Non-Hodgkin\nLymphomas",full:"Non-Hodgkin Lymphomas — Overview",details:["Heterogeneous group of malignant diseases of B- and T-cells of the lymphatic system","Historically: anything that is NOT a Hodgkin lymphoma — today precisely classifiable by molecular genetics","Clinical classification: indolent (low-grade) vs aggressive (high-grade)","Indolent = slow growth, low proliferation rate → hard to target with cytostatics, often palliative","Aggressive = rapid growth → high chemotherapy sensitivity, often curable!","Common aetiologies: EBV, H. pylori, HIV, immunosuppression, aromatic hydrocarbons","General symptoms: B symptoms, painless persistent lymph nodes, splenomegaly","Diagnostics: always lymph node biopsy (complete excision) — no FNA!","Standard staging: Ann-Arbor + PET-CT / CT"]},

      de:{label:"PLASMA-\nZELL-\nNEOPLASIEN",desc:"Monoklonale\nGammopathien",full:"Plasmazellneoplasien — Überblick",details:[

        "Waldenström-Makroglobulinämie: Sonderform mit IgM-Paraprotein + lymphoplasmozytischem Lymphom",
        "Gemeinsames Kennzeichen: monoklonaler Peak in der Serumelektrophorese (M-Gradient) + klonale KM-Infiltration",
        "CRAB-Kriterien definieren behandlungsbedürftiges MM: Hyperkalzämie, Niereninsuffizienz, Anämie, Knochenläsionen",
        "SLiM-Kriterien ergänzen CRAB (IMWG 2014): KM-Plasmazellen ≥60%, FLC-Ratio ≥100, >1 MRT-Herd",
        "Progressionsrisiko von MGUS zu MM: ~1%/Jahr — kumulative Lebenszeitwahrscheinlichkeit beachten!",
        "Diagnostik: Serumelektrophorese, Immunfixation, freie Leichtketten, KM-Biopsie, Ganzkörper-CT oder MRT",
        "Zytogenetik (FISH) bei MM essenziell: del(17p), t(4;14), t(14;16) = Hochrisiko — beeinflusst Therapiewahl"
      ]},
      en:{label:"PLASMA\nCELL\nNEOPLASMS",desc:"Monoclonal\ngammopathies",full:"Plasma Cell Neoplasms — Overview",details:[
        "Clonal proliferation of terminally differentiated B-cells (plasma cells) → monoclonal immunoglobulins (paraproteins)",
        "Spectrum: MGUS (benign, no therapy) → SMM (smouldering) → MM (requires treatment) → AL amyloidosis (organ damage from deposition)",
        "Waldenström macroglobulinaemia: special form with IgM paraprotein + lymphoplasmacytic lymphoma",
        "Common hallmark: monoclonal peak on serum electrophoresis (M-gradient) + clonal BM infiltration",
        "CRAB criteria define treatment-requiring MM: hypercalcaemia, renal failure, anaemia, bone lesions",
        "SLiM criteria supplement CRAB (IMWG 2014): BM plasma cells ≥60%, FLC ratio ≥100, >1 MRI focal lesion",
        "Progression risk from MGUS to MM: ~1%/year — cumulative lifetime probability must be considered!",
        "Diagnostics: serum electrophoresis, immunofixation, free light chains, BM biopsy, whole-body CT or MRI",
        "Cytogenetics (FISH) essential in MM: del(17p), t(4;14), t(14;16) = high risk — influences treatment choice"

        {id:"mgus",
         de:{label:"MGUS",full:"Monoklonale Gammopathie unklarer Signifikanz",details:["Definition: Paraprotein im Serum/Urin + KM-Plasmazellen <10% + KEINE Endorganschäden + kein Therapiebedarf","Häufig laborchemischer Zufallsbefund; Prävalenz zwischen 45. und 75. LJ: ca. 3%","Progressionsrisiko: ~1%/Jahr → Plasmazellneoplasie (am häufigsten) oder B-Zell-Lymphom (z.B. Waldenström)","Kein Behandlungsbedarf — Watch & Wait; erste Kontrolluntersuchung nach 6 Monaten","Regelmässige Kontrollen: SPEP, FLC, Nierenfunktion (Ziel: Ausschluss behandlungsbedürftiger Grunderkrankung)","Leitlinie: DGHO / IMWG"]},
         en:{label:"MGUS",full:"Monoclonal Gammopathy of Undetermined Significance",details:["Definition: paraprotein in serum/urine + BM plasma cells <10% + NO end-organ damage + no therapy needed","Commonly an incidental laboratory finding; prevalence between 45-75 yrs: ~3%","Progression risk: ~1%/year → plasma cell neoplasm (most common) or B-cell lymphoma (e.g. Waldenström)","No treatment needed — watch & wait; first review at 6 months","Regular monitoring: SPEP, FLC, renal function (goal: exclude treatable underlying disease)","Guideline: DGHO / IMWG"],pearls_de:["Progressionsrisiko ~1%/Jahr — lebenslange Kontrolle notwendig!","Erste Kontrolle nach 6 Monaten, danach jährlich (falls stabil)","KEINE Therapie bei MGUS — ausschliesslich Watch & Wait","KM-Plasmazellen <10% + kein CRAB + kein SLiM = MGUS-Definitionskriterien"],pearls_en:["Progression risk ~1%/year — lifelong monitoring required!","First review at 6 months, then annually (if stable)","NO treatment for MGUS — watch & wait only","BM plasma cells <10% + no CRAB + no SLiM = MGUS definition"],relations:[{chain:["MGUS","Schwelendes MM (SMM)","Multiples Myelom (MM)"],arrows:["~1%/Jahr","Endorganschäden (CRAB/SLiM)"],note:"Progressionsspektrum — nicht alle MGUS entwickeln ein MM"}]}},
        {id:"smm",

         en:{label:"Smouldering\nMyeloma",full:"Smouldering Multiple Myeloma",details:["Synonyms: asymptomatic myeloma, smouldering myeloma","Distinction from MGUS: higher plasma cell infiltration in BM or higher paraprotein production","Distinction from MM: NO end-organ damage and no myeloma-defining biomarkers (SLiM-CRAB criteria)","M-protein ≥3 g/dL OR BM plasma cells 10-60% — WITHOUT CRAB/SLiM","Regular monitoring to check for progression to multiple myeloma","High risk (Mayo 20/2/20): consider early therapy (AQUILA trial)","Low/intermediate risk: watch & wait, consider clinical trial enrolment","Guideline: DGHO / IMWG"],pearls_de:["Abgrenzung zu MGUS: höhere M-Protein-Last ODER KM-Plasmazellen 10-60%","Abgrenzung zu MM: KEINE CRAB- oder SLiM-Kriterien erfüllt","Hochrisiko-SMM (Mayo 20/2/20): frühzeitige Therapie erwägen","Watch & Wait ist Standard — ausser klinische Studie"],pearls_en:["Distinction from MGUS: higher M-protein burden OR BM plasma cells 10-60%","Distinction from MM: NO CRAB or SLiM criteria met","High-risk SMM (Mayo 20/2/20): consider early therapy","Watch & wait is standard — unless clinical trial"],relations:[{chain:["MGUS","Schwelendes MM","Multiples Myelom"],arrows:["~1%/Jahr","SLiM/CRAB erfüllt"],note:"SMM ist die Zwischenstufe — Monitoring auf Progression"}]}},
        {id:"mm",
         de:{label:"Multiples\nMyelom",full:"Multiples Myelom",details:["Plasmazellneoplasie mit monoklonalen Immunglobulinen (Paraproteine); Serumelektrophorese: M-Gradient","Neuerkrankungen häufigste zwischen 70-79 Jahren; ♂>♀; Rezidive häufig → Prävalenz hoch!","Diagnose: Klonale Plasmazellen ≥10% + CRAB oder SLiM (IMWG 2014)","CRAB: Hyperkalzämie, Niereninsuffizienz, Anämie, Knochenläsionen","SLiM: KM-Plasmazellen ≥60%, FLC-Ratio ≥100, >1 MRT-Herd","R-ISS Stadium I (β2M ≤3,5 + Albumin ≥3,5 + Standardrisiko-Zytogenetik): ca. 80% 5-JÜR","Zytogenetik: del(17p), t(4;14), t(14;16) = Hochrisiko; beeinflusst Verlauf + Prognose!","Transplantationsgeeignet: Induktion (VRd) → ASZT → Konsolidierung → Lenalidomid-Erhaltung","Transpl.-ungeeignet: Dara-Rd (MAIA) oder Dara-VRd (CEPHEUS)","r/r: Daratumumab, Isatuximab, Carfilzomib, Pomalidomid, Belantamab","CAR-T: Abecma / Carvykti nach ≥4 Vortherapien","Leitlinie: DGHO / IMWG / ESMO"]},
         en:{label:"Multiple\nMyeloma",full:"Multiple Myeloma",details:["Plasma cell neoplasm producing monoclonal immunoglobulins (paraproteins); serum electrophoresis: M-gradient","New diagnoses most common 70-79 years; ♂>♀; relapses frequent → high prevalence!","Diagnosis: clonal plasma cells ≥10% + CRAB or SLiM (IMWG 2014)","CRAB: hypercalcaemia, renal failure, anaemia, bone lesions","SLiM: BM plasma cells ≥60%, FLC ratio ≥100, >1 MRI focal lesion","R-ISS Stage I (β2M ≤3.5 + albumin ≥3.5 + standard-risk cytogenetics): ~80% 5-year OS","Cytogenetics: del(17p), t(4;14), t(14;16) = high risk; influences course + prognosis!","Transplant eligible: induction (VRd) → ASCT → consolidation → lenalidomide maintenance","Transplant ineligible: Dara-Rd (MAIA) or Dara-VRd (CEPHEUS)","r/r: daratumumab, isatuximab, carfilzomib, pomalidomide, belantamab","CAR-T: Abecma / Carvykti after ≥4 prior lines","Guideline: DGHO / IMWG / ESMO"],pearls_de:["CRAB auswendig: Calcium↑, Renal↓, Anämie, Bone (Knochenläsionen)","R-ISS Stadium I: ~80% 5-Jahres-Überleben","Vollständiger Standardpfad: Induktion (VRd) → ASZT → Konsolidierung → Erhaltung (Lenalidomid)","del(17p), t(4;14), t(14;16) = Hochrisiko-Zytogenetik — beeinflusst Therapiewahl!"],pearls_en:["CRAB by heart: Calcium↑, Renal↓, Anaemia, Bone lesions","R-ISS Stage I: ~80% 5-year overall survival","Full standard pathway: induction (VRd) → ASCT → consolidation → maintenance (lenalidomide)","del(17p), t(4;14), t(14;16) = high-risk cytogenetics — influences treatment choice!"],relations:[{chain:["MGUS","Schwelendes MM (SMM)","Multiples Myelom (MM)","Rezidiv/refraktäres MM"],arrows:["~1%/Jahr","SLiM/CRAB erfüllt","Therapieversagen"],note:"Klonale Evolution der Plasmazellerkrankungen"}]}},
        {id:"wm",
         de:{label:"Morbus\nWaldenström",full:"Morbus Waldenström / LPL",details:["Lymphoplasmozytisches Lymphom + IgM-Paraprotein (niedrigmalignes NHL nach WHO)","MGUS kann Vorläufer sein; MYD88 L265P >90%; CXCR4-Mutation → mögliche Ibrutinib-Resistenz","Klinik: Hyperviskositätssyndrom, periphere Neuropathie, Kältehämagglutinine","Therapiebeginn NUR bei Symptomen: Hb <10 g/dl, Hyperviskosität, B-Symptome, Organbefall","Asymptomatisch: Watch & Wait; KM-Aspirat und -Biopsie für Diagnosestellung obligat","Symptomatisch: Anti-CD20-Antikörper Rituximab oder Kombinationstherapie (palliativ)","MYD88mut/CXCR4wt: Ibrutinib oder Zanubrutinib bevorzugt","Alternativ: DRC (Dexamethason + Rituximab + Cyclophosphamid)","Hyperviskositätskrise: Plasmapherese zur Senkung der IgM-Spiegel","Leitlinie: DGHO / ESMO / iwWM"]},
         en:{label:"Waldenström's\nMacroglobulin.",full:"Waldenström's Macroglobulinaemia / LPL",details:["Lymphoplasmacytic lymphoma + IgM paraprotein (low-grade NHL per WHO)","MGUS can be precursor; MYD88 L265P >90%; CXCR4 mutation → possible ibrutinib resistance","Clinical: hyperviscosity syndrome, peripheral neuropathy, cold agglutinins","Start treatment ONLY when symptomatic: Hb <10 g/dL, hyperviscosity, B symptoms, organ involvement","Asymptomatic: watch & wait; BM aspirate + biopsy mandatory for diagnosis","Symptomatic: anti-CD20 antibody rituximab or combination therapy (palliative)","MYD88mut/CXCR4wt: ibrutinib or zanubrutinib preferred","Alternative: DRC (dexamethasone + rituximab + cyclophosphamide)","Hyperviscosity crisis: plasmapheresis to reduce IgM levels","Guideline: DGHO / ESMO / iwWM"]}},
        {id:"plasmozytom",
         de:{label:"Plasmo-\nzytom",full:"Solitäres Plasmozytom",details:[
           "Definition: solitärer Herd klonaler Plasmazellen OHNE systemische Erkrankung — kein CRAB, keine weiteren Läsionen",
           "Zwei Entitäten: Ossäres Plasmozytom (Knochen, häufiger) vs. Extramedulläres Plasmozytom (Weichgewebe)",
           "Ossäres Plasmozytom: häufigste Lokalisation Wirbelsäule, Becken, Schädel; Leitsymptom Knochenschmerz",
           "Extramedulläres Plasmozytom: häufig obere Atemwege (Nasopharynx, Tonsille) und GI-Trakt",
           "Diagnose: Biopsie + KM-Biopsie (Ausschluss MM: Plasmazellen <10%) + Ganzkörper-MRT obligat",
           "PET-CT zum Ausschluss weiterer Herde — jeder zusätzliche Herd = MM-Diagnose!",
           "Therapie ossär: kurative Strahlentherapie 40-50 Gy Involved Field — keine systemische Chemo nötig",
           "Therapie extramedulläres: Strahlentherapie ± Resektion; sehr gute Prognose",
           "Progressionsrisiko zu MM: ossär ~50-60% nach 10 Jahren; extramedulläres <30%",
           "Nachsorge: SPEP, Immunfixation, Ganzkörper-MRT alle 6-12 Monate",
           "Leitlinie: DGHO / IMWG"
         ],
         pearls_de:[
           "Kein CRAB + kein SLiM + einzelner Herd = Plasmozytom — nicht gleich MM!",
           "Ossäres Plasmozytom: ~50% Progression zu MM in 10 Jahren — Nachsorge lebenslang!",
           "Therapie der Wahl: Strahlentherapie 40-50 Gy (kurativ!) — kein CHOP, keine Chemo",
           "Ganzkörper-MRT obligat: weitere okkulte Läsionen → MM-Diagnose statt Plasmozytom!"
         ],
         relations:[{chain:["Solitäres Plasmozytom","Multiples Myelom (MM)"],arrows:["~50% ossär / <30% extramedulläres in 10 J."],note:"Progressionsrisiko abhängig von Lokalisation — engmaschige Nachsorge entscheidend"}]
         },
         en:{label:"Plasma-\ncytoma",full:"Solitary Plasmacytoma",details:[
           "Definition: solitary focus of clonal plasma cells WITHOUT systemic disease — no CRAB, no additional lesions",
           "Two entities: osseous plasmacytoma (bone, more common) vs extramedullary plasmacytoma (soft tissue)",
           "Osseous plasmacytoma: most common sites — spine, pelvis, skull; leading symptom bone pain",
           "Extramedullary plasmacytoma: commonly upper respiratory tract (nasopharynx, tonsil) and GI tract",
           "Diagnosis: biopsy + BM biopsy (exclude MM: plasma cells <10%) + whole-body MRI mandatory",
           "PET-CT to exclude additional lesions — any extra lesion = MM diagnosis!",
           "Therapy osseous: curative radiotherapy 40-50 Gy involved field — no systemic chemo needed",
           "Therapy extramedullary: radiotherapy ± resection; very good prognosis",
           "Progression risk to MM: osseous ~50-60% at 10 years; extramedullary <30%",
           "Follow-up: SPEP, immunofixation, whole-body MRI every 6-12 months",
           "Guideline: DGHO / IMWG"
         ],
         pearls_en:[
           "No CRAB + no SLiM + single lesion = plasmacytoma — not MM!",
           "Osseous plasmacytoma: ~50% progression to MM at 10 years — lifelong follow-up!",
           "Treatment of choice: radiotherapy 40-50 Gy (curative!) — no chemo needed",
           "Whole-body MRI mandatory: additional occult lesions → MM diagnosis instead!"
         ],
         relations:[{chain:["Solitary Plasmacytoma","Multiple Myeloma"],arrows:["~50% osseous / <30% extramedullary at 10 yrs"],note:"Progression risk depends on site — close surveillance is critical"}]
         }},

         de:{label:"AL-\nAmyloidose",full:"AL-Amyloidose (Leichtketten-Amyloidose)",details:["Fehlfaltung monoklonaler Leichtketten → Organablagerung","Organe: Herz (häufigste Todesursache), Niere, Leber, Nerven","Diagnose: Kongorot-Färbung (apfelgrüne Doppelbrechung) + LC-MS","Staging: Mayo-Klinik-Score 2012 (NT-proBNP, Troponin T, dFLC)","Standard: Dara-VCd (Daratumumab+Bortezomib+Cycloph.+Dex) - ANDROMEDA","Transplantationsgeeignet (selten, Herz-Stad. I/II): HDT + ASZT","Leitlinie: DGHO / ESC / ISA"]},

    {
      id:"mpn",
      de:{label:"MPN",desc:"JAK2/CALR\nMPL-Mutation",full:"Myeloproliferative Neoplasien — Überblick",details:[

        "Klassische BCR-ABL1-negative MPN: Polycythaemia Vera (PV), Essentielle Thrombozythämie (ET), Primäre Myelofibrose (PMF)",
        "CML (BCR-ABL1-positiv) = eigene Kategorie, historisch zu MPN gezählt",
        "Treibermutationen der klassischen MPN: JAK2 V617F (PV: >97%, ET/PMF: ~55%), CALR (ET/PMF: ~25%), MPL (ET/PMF: ~3%)",
        "JAK2/CALR/MPL-Mutationen aktivieren den JAK-STAT-Signalweg → unkontrollierte Zellproliferation",
        "Hauptrisiken: Thrombose + Blutung (Paradoxon durch Thrombozytenfunktionsstörung), Transformation in Myelofibrose oder AML",
        "Systemische Mastozytose: KIT D816V-Mutation, separate Entität mit spezifischer Therapie (Midostaurin, Avapritinib)",
        "Diagnose: Blutbild, KM-Biopsie, molekulargenetik (JAK2/CALR/MPL), Ausschluss reaktiver Ursachen!",
        "Ruxolitinib (JAK1/2-Inhibitor): Standardtherapie bei Hochrisiko-PV und MF (COMFORT-/RESPONSE-Studien)"
      ]},
      en:{label:"MPN",desc:"JAK2/CALR\nMPL mutations",full:"Myeloproliferative Neoplasms — Overview",details:[
        "Clonal myeloid disorders: uncontrolled proliferation of one or more blood cell lineages — but cells do mature (unlike AML)!",
        "Classic BCR-ABL1-negative MPN: polycythaemia vera (PV), essential thrombocythaemia (ET), primary myelofibrosis (PMF)",
        "CML (BCR-ABL1-positive) = its own category, historically grouped with MPN",
        "Driver mutations of classic MPN: JAK2 V617F (PV: >97%, ET/PMF: ~55%), CALR (ET/PMF: ~25%), MPL (ET/PMF: ~3%)",
        "JAK2/CALR/MPL mutations activate the JAK-STAT signalling pathway → uncontrolled cell proliferation",
        "Main risks: thrombosis + bleeding (paradox via platelet dysfunction), transformation to myelofibrosis or AML",
        "Systemic mastocytosis: KIT D816V mutation, separate entity with specific therapy (midostaurin, avapritinib)",
        "Diagnosis: blood count, BM biopsy, molecular genetics (JAK2/CALR/MPL), exclusion of reactive causes!",
        "Ruxolitinib (JAK1/2 inhibitor): standard therapy for high-risk PV and MF (COMFORT/RESPONSE trials)"
      ]},
      color:"#e8a030",
      children:[
        {id:"pv",
         de:{label:"Polycythaemia\nVera",full:"Polycythaemia Vera",details:["JAK2 V617F in >97%; JAK2 Exon-12 bei übrigen","WHO 2022: Hb ≥16,5 g/dl (m) / ≥16 g/dl (f) + KM + JAK2","Risiken: Thrombose, Blutung, Transformation in MF/AML","Stratifikation: Niedrig- vs. Hochrisiko (Alter >60 J. oder VTE)","Alle Patienten: Niedrigdosis-ASS + Zielwert Hkt <45% (CYTO-PV)","Hochrisiko: Hydroxycarbamid als Erstlinie","Ruxolitinib: bei Hydroxyurea-Versagen (RESPONSE-Studie)","Leitlinie: DGHO / ELN / ESMO"]},
         en:{label:"Polycythaemia\nVera",full:"Polycythaemia Vera",details:["JAK2 V617F in >97%; JAK2 exon-12 in remaining","WHO 2022: Hb ≥16.5 g/dL (m) / ≥16 g/dL (f) + BM + JAK2","Risks: thrombosis, bleeding, transformation to MF/AML","Stratification: low vs high risk (age >60 or prior VTE)","All patients: low-dose aspirin + target Hct <45% (CYTO-PV)","High risk: hydroxycarbamide first line","Ruxolitinib: for hydroxycarbamide failure (RESPONSE trial)","Guideline: DGHO / ELN / ESMO"],pearls_de:["JAK2 V617F in >97% — Screening-Mutation der Wahl","Zielwert Hämatokrit <45% (CYTO-PV-Studie) für alle Patienten","ASS für ALLE Patienten (ausser Kontraindikation)","Ruxolitinib bei Hydroxyurea-Versagen oder Unverträglichkeit"],pearls_en:["JAK2 V617F in >97% — screening mutation of choice","Target haematocrit <45% (CYTO-PV trial) for all patients","Aspirin for ALL patients (unless contraindicated)","Ruxolitinib for hydroxycarbamide failure or intolerance"],relations:[{chain:["Polycythaemia Vera","Sekundäre Myelofibrose","AML-Transformation"],arrows:["Jahre bis Jahrzehnte","~5-10% Risiko"],note:"Natürlicher Verlauf der MPN — durch JAK2-Inhibition verlangsamt"}]}},
        {id:"et",
         de:{label:"Essentielle\nThrombozyt.",full:"Essentielle Thrombozythämie",details:["Thrombozyten >450 × 10⁹/l persistierend","Mutationen: JAK2 V617F (55%), CALR (25%), MPL (3%), Triple-neg. (17%)","CALR-mutiert: geringeres Thromboserisiko als JAK2","Risikoklassifikation: IPSET-Thrombose (revidiert)","Niedrigrisiko: Beobachtung oder ASS","Hochrisiko: ASS + Hydroxycarbamid (Erstlinie)","Schwangerschaft: ASS ± NMH; Interferon-alpha bevorzugen","Leitlinie: DGHO / ELN"]},
         en:{label:"Essential\nThrombocythaem.",full:"Essential Thrombocythaemia",details:["Platelets >450 × 10⁹/L persistent","Mutations: JAK2 V617F (55%), CALR (25%), MPL (3%), triple-neg (17%)","CALR-mutated: lower thrombosis risk than JAK2","Risk classification: revised IPSET-thrombosis","Low risk: observation or aspirin","High risk: aspirin + hydroxycarbamide (first line)","Pregnancy: aspirin ± LMWH; prefer interferon-alpha","Guideline: DGHO / ELN"],pearls_de:["JAK2 V617F (55%) vs. CALR (25%): CALR = geringeres Thromboserisiko!","Ziel: Thrombozyten <600 × 10⁹/l bei Hochrisiko","Schwangerschaft: Interferon bevorzugen (kein Hydroxyurea!)","Richter: ET kann in Myelofibrose oder selten AML transformieren"],pearls_en:["JAK2 V617F (55%) vs CALR (25%): CALR = lower thrombosis risk!","Target: platelets <600 × 10⁹/L in high risk","Pregnancy: prefer interferon (no hydroxycarbamide!)","Note: ET can transform to myelofibrosis or rarely AML"],relations:[{chain:["Essentielle Thrombozythämie","Post-ET-Myelofibrose","AML-Transformation"],arrows:["~1–2%/Jahr","Selten, ~1%"],note:"ET hat niedrigstes Transformationsrisiko aller klassischen MPN"}]}},
        {id:"mf",
         de:{label:"Primäre\nMyelofibrose",full:"Primäre Myelofibrose",details:["Mutationen: JAK2 V617F (60%), CALR (25%), MPL (8%)","Hochrisiko: ASXL1, EZH2, IDH1/2, SRSF2 (MIPSS70)","Klinik: Splenomegalie, konst. Symptome, Tränentropfenerythrozyten","Prognose-Score: DIPSS-Plus oder MIPSS70+v2","Ruxolitinib: Standard bei Splenomegalie (COMFORT-I/II)","Fedratinib, Pacritinib: bei Ruxolitinib-Versagen / Thrombozytopenie","Momelotinib: bei Anämie + Splenomegalie (MOMENTUM)","AlloSZT: einzige kurative Option bei Hochrisikopatienten","Leitlinie: DGHO / ELN"]},
         en:{label:"Primary\nMyelofibrosis",full:"Primary Myelofibrosis",details:["Mutations: JAK2 V617F (60%), CALR (25%), MPL (8%)","High-risk: ASXL1, EZH2, IDH1/2, SRSF2 (MIPSS70)","Clinical: splenomegaly, constitutional symptoms, teardrop erythrocytes","Prognosis score: DIPSS-Plus or MIPSS70+v2","Ruxolitinib: standard for splenomegaly (COMFORT-I/II)","Fedratinib, pacritinib: for ruxolitinib failure / thrombocytopenia","Momelotinib: for anaemia + splenomegaly (MOMENTUM)","AlloSCT: only potentially curative option in high-risk patients","Guideline: DGHO / ELN"],pearls_de:["Tränentropfenerythrozyten im Blutausstrich = klassischer Befund","AlloSZT = EINZIGE kurative Option — Ruxolitinib ist palliativ!","Ruxolitinib verbessert Symptome/Milzgröße, verlängert Überleben aber NICHT kurativ","Hochrisiko-Mutationen (ASXL1, EZH2, IDH, SRSF2) verschlechtern Prognose deutlich"],pearls_en:["Teardrop erythrocytes on blood smear = classic finding","AlloSCT = ONLY curative option — ruxolitinib is palliative!","Ruxolitinib improves symptoms/spleen size but is NOT curative","High-risk mutations (ASXL1, EZH2, IDH, SRSF2) worsen prognosis significantly"],relations:[{chain:["Primäre Myelofibrose","Akzelerationsphase (Blasten 10-19%)","AML-Transformation (Blasten ≥20%)"],arrows:["Klonale Evolution","~10-20% Risiko"],note:"MF hat das höchste AML-Transformationsrisiko aller klassischen MPN"},{chain:["PV / ET","Post-PV- / Post-ET-Myelofibrose","AML"],arrows:["Sekundäre MF","Blastenakkumulation"],note:"MF kann de novo entstehen ODER aus PV/ET transformieren"}]}},
        {id:"sm_mpn",

    {
      id:"mds",
      de:{label:"MDS",desc:"Ineffektive\nHämatopoese",full:"Myelodysplastische Syndrome — Überblick",details:[
        "Klonale Stammzellerkrankung: Dysplasie + ineffektive Hämatopoese → Zytopenie(n) trotz normaler oder hyperzellulärer KM-Zellularität",
        "Kernpathophysiologie: exzessive Apoptose dysplastischer Zellen im KM — dadurch Paradox 'viel im KM, wenig im Blut'",
        "MDS ≠ akute Leukämie: Blastenanteil <20% (WHO 2022); Übergang möglich (MDS-EB → AML)",
        "Häufige somatische Mutationen: SF3B1 (Spliceosom), TET2, ASXL1, DNMT3A (Epigenetik), TP53, RUNX1",
        "Risikostratifizierung IPSS-R: Very Low / Low / Intermediate / High / Very High → bestimmt Therapieintensität",
        "Molekularer IPSS-M (2022): ergänzt IPSS-R um 31 Gene, präzisere Prognose",
        "Einzige kurative Option: allogene Stammzelltransplantation (alloSZT) — nur für geeignete Patienten",
        "Niedrigrisiko: symptomorientiert (Luspatercept, ESA, Lenalidomid bei del5q, Transfusionen)",
        "Hochrisiko: Azacitidin-Standard (AZA-001); Venetoclax-Kombination in Studien/Zulassung",
        "Sekundäres MDS (nach Chemo/Strahlung): TP53-Mutationen häufig, sehr schlechte Prognose"
      ]},
      en:{label:"MDS",desc:"Ineffective\nhaematopoiesis",full:"Myelodysplastic Syndromes — Overview",details:[

        "Core pathophysiology: excessive apoptosis of dysplastic cells in BM — paradox: 'full BM, empty blood'",
        "MDS ≠ acute leukaemia: blast count <20% (WHO 2022); progression possible (MDS-EB → AML)",
        "Common somatic mutations: SF3B1 (spliceosome), TET2, ASXL1, DNMT3A (epigenetics), TP53, RUNX1",
        "Risk stratification IPSS-R: Very Low / Low / Intermediate / High / Very High → determines treatment intensity",
        "Molecular IPSS-M (2022): supplements IPSS-R with 31 genes for more precise prognosis",
        "Only curative option: allogeneic stem cell transplantation (alloSCT) — for eligible patients only",
        "Low risk: symptom-oriented (luspatercept, ESA, lenalidomide for del5q, transfusions)",
        "High risk: azacitidine standard (AZA-001); venetoclax combinations in trials/approval",
        "Secondary MDS (post-chemo/radiation): TP53 mutations frequent, very poor prognosis"
      ]},

function flattenNodes(node,parent=null){const r=[{...node,parent}];if(node.children)for(const c of node.children)r.push(...flattenNodes(c,node.id));return r;}
function computeLayout(node,cx,cy,sa,ea,depth=0,px=null,py=null){
  const radii=[0,155,290,400,488];
  const r=radii[Math.min(depth,radii.length-1)];
  const angle=(sa+ea)/2;
  const x=depth===0?cx:cx+r*Math.cos(angle);
  const y=depth===0?cy:cy+r*Math.sin(angle);
  const result=[{node,x,y,angle,depth,parentX:px??cx,parentY:py??cy}];
  if(node.children?.length){const n=node.children.length,span=ea-sa,step=span/n;node.children.forEach((c,i)=>{const cs=sa+i*step;result.push(...computeLayout(c,cx,cy,cs,cs+step,depth+1,x,y));});}
  return result;
}
function buildParentMap(nodes){const map={};nodes.forEach(item=>{item.node.children?.forEach(c=>{map[c.id]=item.node.id;});});return map;}
function getColor(id,pm){let cur=id;for(let i=0;i<10;i++){if(COLORS[cur])return COLORS[cur];cur=pm[cur];if(!cur)break;}return "#7788aa";}
function gl(node,lang,field){return(node[lang]&&node[lang][field])?node[lang][field]:(node.de&&node.de[field])?node.de[field]:"";}

  const parentMap=buildParentMap(layoutNodes);
  const allFlat=flattenNodes(data);

  const searchResults=search.trim().length>1?allFlat.filter(n=>{const q=search.toLowerCase();return gl(n,lang,"label")?.toLowerCase().includes(q)||gl(n,lang,"full")?.toLowerCase().includes(q)||(gl(n,lang,"details")||[]).some(d=>d.toLowerCase().includes(q));})
  :[];
  const highlightIds=new Set(searchResults.map(n=>n.id));

  function onMD(e){setDragging(true);setDragStart({x:e.clientX-pan.x,y:e.clientY-pan.y});}
  function onMM(e){if(!dragging)return;setPan({x:e.clientX-dragStart.x,y:e.clientY-dragStart.y});}
  function onMU(){setDragging(false);}
  function onW(e){e.preventDefault();setZoom(z=>Math.max(0.3,Math.min(3,z-e.deltaY*0.001)));}

  const selNode=selected?allFlat.find(n=>n.id===selected):null;
  const ui=lang==="de"
    ?{title:"Hämatologische Neoplasien",sub:"DGHO-Leitlinien · Übersicht",ph:"Suche: Diagnose, Mutation, Therapie …",hint:"Ziehen = Pan · Scrollen = Zoom · Klicken = Details",diagLbl:"Diagnose",noRes:"Keine Treffer",resLbl:n=>n===1?"ERGEBNIS":"ERGEBNISSE"}
    :{title:"Haematological Neoplasms",sub:"DGHO Guidelines · Overview",ph:"Search: diagnosis, mutation, drug …",hint:"Drag = pan · Scroll = zoom · Click = details",diagLbl:"Diagnosis",noRes:"No results",resLbl:n=>n===1?"RESULT":"RESULTS"};
  const legend=lang==="de"?[["leukaemie","Leukämien"],["lymphom","Lymphome"],["plasma","Plasmazellen"],["mpn","MPN"],["mds","MDS"],["sonstige","Sonstiges"]]:[["leukaemie","Leukaemias"],["lymphom","Lymphomas"],["plasma","Plasma Cell"],["mpn","MPN"],["mds","MDS"],["sonstige","Other"]];

  return(
    <div style={{background:"#080c18",height:"100vh",fontFamily:"'IBM Plex Mono',monospace",color:"#e8eaf6",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* HEADER */}
      <div style={{padding:"10px 20px",borderBottom:"1px solid #1a2040",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",background:"rgba(8,12,24,0.97)",zIndex:10}}>
        <div>
          <div style={{fontSize:9,letterSpacing:"0.28em",color:"#4455aa",textTransform:"uppercase"}}>{ui.sub}</div>
          <div style={{fontSize:17,fontWeight:700,color:"#c8d8ff",letterSpacing:"0.04em"}}>{ui.title}</div>
        </div>
        <div style={{flex:1}}/>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={ui.ph}
          style={{background:"#101520",border:"1px solid #243060",borderRadius:6,color:"#c8d8ff",padding:"6px 12px",fontSize:12,width:255,outline:"none",fontFamily:"inherit"}}/>
        <div style={{display:"flex",gap:2,background:"#0a1020",border:"1px solid #243060",borderRadius:6,padding:2}}>
          {["de","en"].map(l=>(
            <button key={l} onClick={()=>setLang(l)}
              style={{background:lang===l?"#1a2848":"transparent",border:lang===l?"1px solid #5b8dee":"1px solid transparent",color:lang===l?"#c8d8ff":"#556688",borderRadius:4,padding:"3px 10px",cursor:"pointer",fontSize:11,fontFamily:"inherit",fontWeight:lang===l?700:400}}>
              {l.toUpperCase()}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:3}}>
          {[["＋",()=>setZoom(z=>Math.min(3,z+0.15))],["－",()=>setZoom(z=>Math.max(0.3,z-0.15))],["⌂",()=>{setZoom(1);setPan({x:0,y:0});}]].map(([l,f])=>(
            <button key={l} onClick={f} style={{background:"#101520",border:"1px solid #243060",color:"#7788aa",borderRadius:5,padding:"4px 10px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{l}</button>
          ))}
        </div>
      </div>
      {/* LEGEND */}
      <div style={{display:"flex",gap:12,padding:"5px 20px",borderBottom:"1px solid #141930",fontSize:10,flexWrap:"wrap",alignItems:"center"}}>
        {legend.map(([k,v])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:8,height:8,borderRadius:2,background:COLORS[k]}}/>
            <span style={{color:"#6677aa"}}>{v}</span>
          </div>
        ))}
        <div style={{marginLeft:"auto",color:"#2a3460",fontSize:9}}>{ui.hint}</div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:8,paddingLeft:12,borderLeft:"1px solid #1a2040"}}>
          <div style={{width:13,height:13,borderRadius:"50%",background:"#f59e0b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,color:"#0a0f20"}}>A</div>
          <span style={{color:"#7788bb",fontSize:9}}>AMBOSS-Artikel vorhanden (7 Artikel)</span>
        </div>
      </div>
      {/* SEARCH OVERLAY */}
      {search.trim().length>1&&(
        <div style={{position:"fixed",top:90,right:20,background:"#0e1425",border:"1px solid #243060",borderRadius:8,padding:10,zIndex:20,maxWidth:295,maxHeight:295,overflowY:"auto",fontSize:11}}>
          <div style={{color:"#4455aa",marginBottom:6,letterSpacing:"0.1em"}}>{searchResults.length} {ui.resLbl(searchResults.length)}</div>
          {searchResults.map(n=>(
            <div key={n.id} onClick={()=>{setSelected(n.id);setSearch("");}}
              style={{padding:"5px 7px",cursor:"pointer",borderRadius:4,marginBottom:2,background:"#1a2040",color:"#c8d8ff"}}
              onMouseEnter={e=>e.currentTarget.style.background="#253060"}
              onMouseLeave={e=>e.currentTarget.style.background="#1a2040"}>
              <span style={{color:getColor(n.id,parentMap)}}>■ </span>
              {gl(n,lang,"full")||gl(n,lang,"label")?.replace("\n"," ")}
            </div>
          ))}
          {searchResults.length===0&&<div style={{color:"#334"}}>{ui.noRes}</div>}
        </div>
      )}
      {/* MAP */}
      <div style={{flex:1,overflow:"hidden",cursor:dragging?"grabbing":"grab"}} onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU} onWheel={onW}>
        <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"center",transition:dragging?"none":"transform 0.1s"}}>
          <defs>
            {Object.entries(COLORS).map(([k,v])=>(
              <radialGradient key={k} id={`g_${k}`} cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor={v} stopOpacity="0.2"/><stop offset="100%" stopColor={v} stopOpacity="0.02"/>
              </radialGradient>
            ))}
            <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

          </defs>
          {/* EDGES */}
          {layoutNodes.filter(i=>i.depth>0).map((item,i)=>{
            const color=getColor(item.node.id,parentMap);
            const hl=highlightIds.size>0?highlightIds.has(item.node.id):true;
            return <line key={i} x1={item.parentX} y1={item.parentY} x2={item.x} y2={item.y} stroke={color} strokeWidth={item.depth===1?2:1} strokeOpacity={hl?(item.depth===1?0.65:0.35):0.06} strokeDasharray={item.depth>2?"4 3":"none"}/>;
          })}
          {/* NODES */}
          {layoutNodes.map((item,i)=>{
            const {node,x,y,depth,angle}=item;
            const color=depth===0?"#c8d8ff":getColor(node.id,parentMap);
            const isSel=selected===node.id,isHov=hovered===node.id;
            const isAmboss=AMBOSS_IDS.has(node.id);
            const hl=highlightIds.size>0?highlightIds.has(node.id):true;
            const sz=[54,41,30,24,20][Math.min(depth,4)];
            const label=gl(node,lang,"label")||"";
            const desc=depth===1?gl(node,lang,"desc"):null;
            const lines=label.split("\n");
            const descLines=desc?desc.split("\n"):[];
            const hasClick = depth > 0;

            // Labels always inside circles
            const labelOutside = false;
            const anchor = "middle";
            const fs = [12,9,8,7.2,6.8][Math.min(depth,4)];
            const lineH = fs + 2.5;

            // Depth-1 label shift when descriptor present
            const labelShift = depth===1&&descLines.length>0 ? -(descLines.length*3.5) : 0;

            return(
              <g key={i} transform={`translate(${x},${y})`} style={{cursor:hasClick?"pointer":"default"}}
                onClick={()=>hasClick&&setSelected(isSel?null:node.id)}
                onMouseEnter={()=>setHovered(node.id)} onMouseLeave={()=>setHovered(null)}>
                {isSel&&<circle r={sz+11} fill="none" stroke={color} strokeWidth="1.5" strokeOpacity="0.45" filter="url(#glow)"/>}
                {isAmboss&&depth>0&&<circle r={sz+4} fill="none" stroke="#f59e0b" strokeWidth={depth===1?"1.2":"0.8"} strokeOpacity={hl?0.55:0.1} strokeDasharray="3 2"/>}
                {depth===1&&<circle r={sz+5} fill={`url(#g_${node.id})`} stroke={color} strokeWidth="0.5" strokeOpacity={hl?0.28:0.04}/>}
                <circle r={sz}
                  fill={depth===0?"#151d38":isSel?`${color}22`:isHov?`${color}18`:"#0b1020"}
                  stroke={color} strokeWidth={isSel?2.5:isHov?1.8:depth===0?2.5:depth===1?1.5:0.8}
                  strokeOpacity={hl?1:0.12} fillOpacity={hl?1:0.2}/>

                {/* Label inside circle */}
                <g>
                    {lines.map((line,li)=>(
                      <text key={li} textAnchor="middle" dominantBaseline="middle"
                        y={labelShift+(lines.length>1?(li-(lines.length-1)/2)*lineH:0)}
                        fontSize={fs} fontWeight={depth<=1?700:600}
                        fill={color} fillOpacity={hl?1:0.18}
                        style={{userSelect:"none",fontFamily:"inherit"}}>
                        {line}
                      </text>
                    ))}
                    {depth===1&&descLines.map((dl,dli)=>(
                      <text key={`d${dli}`} textAnchor="middle" dominantBaseline="middle"
                        y={labelShift+(lines.length>1?(lines.length/2)*lineH:fs*0.7)+dli*7.5}
                        fontSize={6} fontWeight={400}
                        fill={color} fillOpacity={hl?0.55:0.08}
                        style={{userSelect:"none",fontFamily:"inherit"}}>
                        {dl}
                      </text>
                    ))}
                </g>



                {/* AMBOSS badge */}
                {isAmboss&&depth>0&&<g transform={`translate(${(sz*0.68).toFixed(1)},${(-sz*0.68).toFixed(1)})`}>
                  <circle r={(Math.max(sz*0.30,4.5)).toFixed(1)} fill="#f59e0b" stroke="#0a0f20" strokeWidth="0.8" fillOpacity={hl?0.95:0.25}/>
                  <text textAnchor="middle" dominantBaseline="middle" fontSize={(Math.max(sz*0.21,3.2)).toFixed(1)} fontWeight="800" fill="#0a0f20" fillOpacity={hl?1:0.5} style={{userSelect:"none",fontFamily:"inherit"}}>A</text>
                </g>}

              </g>
            );
          })}
        </svg>
      </div>
      {/* DETAIL PANEL */}
      {selNode&&(()=>{
        const color=getColor(selNode.id,parentMap);
        const baseBullets=gl(selNode,lang,"details")||[];
        const extras=customBullets[selNode.id]||[];
        const nodeHighlights=highlights[selNode.id]||new Set();
        // depth of selected node
        const selDepth=(layoutNodes.find(n=>n.node.id===selNode.id)||{depth:1}).depth;
        // immediate children for group-overview display
        const children=selNode.children||[];
        // pearls and relations (injected into en:{} block, so live at selNode.en.*)
        const pearls=lang==="de"
          ?(selNode.en?.pearls_de||selNode.de?.pearls_de||[])
          :(selNode.en?.pearls_en||[]);
        const relations=selNode.en?.relations||selNode.relations||[];

        function toggleHighlight(key){
          setHighlights(h=>{
            const prev=h[selNode.id]||new Set();
            const next=new Set(prev);
            next.has(key)?next.delete(key):next.add(key);
            return {...h,[selNode.id]:next};
          });
        }
        function removeBullet(key){
          const idx=parseInt(key.replace("custom_",""));
          setCustomBullets(cb=>{
            const arr=[...(cb[selNode.id]||[])];
            arr.splice(idx,1);
            return {...cb,[selNode.id]:arr};
          });
          setHighlights(h=>{
            const prev=h[selNode.id]||new Set();
            const next=new Set(prev);
            next.delete(key);
            return {...h,[selNode.id]:next};
          });
        }
        function addBullet(){
          const txt=addInput.trim();
          if(!txt)return;
          setCustomBullets(cb=>({...cb,[selNode.id]:[...(cb[selNode.id]||[]),txt]}));
          setAddInput("");
        }

        const allBullets=[
          ...baseBullets.map((d,i)=>({key:`base_${i}`,text:d,isCustom:false})),
          ...extras.map((d,i)=>({key:`custom_${i}`,text:d,isCustom:true})),
        ];

        const typeLabel=selDepth===1
          ?(lang==="de"?"GRUPPE":"GROUP")
          :selDepth===2
          ?(lang==="de"?"KATEGORIE":"CATEGORY")
          :(lang==="de"?"DIAGNOSE":"DIAGNOSIS");

        return(
        <div style={{position:"fixed",right:0,top:0,bottom:0,width:370,background:"#0a0f1e",borderLeft:"1px solid #1a2448",padding:"20px 17px",overflowY:"auto",zIndex:30,boxShadow:"-12px 0 50px rgba(0,0,0,0.65)"}}>
          {/* top bar */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12}}>
            <button onClick={()=>setEditMode(m=>!m)}
              style={{background:editMode?"#1a2848":"#111827",border:`1px solid ${editMode?"#5b8dee":"#243060"}`,color:editMode?"#c8d8ff":"#7788aa",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>
              ✎ {lang==="de"?"Bearbeiten":"Edit"}
            </button>
            <div style={{flex:1}}/>
            <button onClick={()=>{setSelected(null);setEditMode(false);}} style={{background:"#111827",border:"1px solid #243060",color:"#7788aa",borderRadius:5,padding:"3px 9px",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>✕</button>
          </div>

          {/* type badge */}
          <div style={{fontSize:9,letterSpacing:"0.22em",color,textTransform:"uppercase",marginBottom:5}}>{typeLabel}</div>
          <div style={{fontSize:15,fontWeight:700,color:"#e8eaf6",marginBottom:5,lineHeight:1.35}}>
            {gl(selNode,lang,"full")||gl(selNode,lang,"label")?.replace(/\n/g," ")}
          </div>
          {gl(selNode,lang,"full")&&(
            <div style={{display:"inline-block",background:`${color}18`,border:`1px solid ${color}40`,borderRadius:4,padding:"2px 7px",fontSize:10,color,marginBottom:12}}>
              {gl(selNode,lang,"label")?.replace(/\n/g," ")}
            </div>
          )}

          {/* children chip list for group/category nodes */}
          {children.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:"0.18em",color:"#445588",marginBottom:6}}>
                {lang==="de"?"ENTHÄLT":"CONTAINS"} · {children.length}
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {children.map(c=>(
                  <button key={c.id} onClick={()=>setSelected(c.id)}
                    style={{background:`${color}12`,border:`1px solid ${color}35`,borderRadius:4,padding:"3px 8px",fontSize:10,color,cursor:"pointer",fontFamily:"inherit",textAlign:"left",lineHeight:1.3}}>
                    {(gl(c,lang,"full")||gl(c,lang,"label")||"").replace(/\n/g," ")}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* DISEASE RELATIONS */}
          {relations.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:"0.18em",color:"#3a6655",marginBottom:8,display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:12}}>🔗</span>
                {lang==="de"?"KRANKHEITSVERLAUF":"DISEASE PROGRESSION"}
              </div>
              {relations.map((rel,ri)=>(
                <div key={ri} style={{marginBottom:10}}>
                  {/* chain */}
                  <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:0}}>
                    {rel.chain.map((step,si)=>(
                      <React.Fragment key={si}>
                        <div style={{
                          background:si===0?"#0e2218":si===rel.chain.length-1?"#1a0e2a":"#0e1a28",
                          border:`1px solid ${si===0?"#3dbf9e":si===rel.chain.length-1?"#b06be3":color}55`,
                          borderRadius:5,padding:"4px 8px",fontSize:10,lineHeight:1.3,
                          color:si===0?"#6ee7b7":si===rel.chain.length-1?"#c4b5fd":"#93c5fd",
                          fontWeight:600,maxWidth:100,textAlign:"center"}}>
                          {step}
                        </div>
                        {si<rel.chain.length-1&&(
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"0 3px",minWidth:36}}>
                            <div style={{fontSize:9,color:"#445566",textAlign:"center",lineHeight:1.2,marginBottom:1}}>{rel.arrows[si]}</div>
                            <div style={{fontSize:14,color:"#445566",lineHeight:1}}>→</div>
                          </div>
                        )}
                      </React.Fragment>
                    ))}
                  </div>
                  {/* note */}
                  <div style={{fontSize:10,color:"#4a6670",marginTop:5,fontStyle:"italic"}}>{rel.note}</div>
                </div>
              ))}
            </div>
          )}

          {/* EXAM PEARLS */}
          {pearls.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:9,letterSpacing:"0.18em",color:"#cc4444",marginBottom:7,display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:12}}>🚨</span>
                {lang==="de"?"PRÜFUNGSRELEVANT":"EXAM PEARLS"}
              </div>
              {pearls.map((p,pi)=>(
                <div key={pi} style={{marginBottom:5,padding:"6px 10px",
                  background:"rgba(220,50,50,0.07)",
                  border:"1px solid rgba(220,50,50,0.25)",
                  borderLeft:"3px solid #dc3232",
                  borderRadius:"0 5px 5px 0",fontSize:11,lineHeight:1.5,
                  color:"#fca5a5",fontWeight:500}}>
                  {p}
                </div>
              ))}
            </div>
          )}

          {/* bullets */}
          {allBullets.length>0&&(
            <div style={{fontSize:9,letterSpacing:"0.18em",color:"#445588",marginBottom:8}}>
              {lang==="de"?"ÜBERBLICK":"OVERVIEW"}
            </div>
          )}
          {allBullets.map(({key,text,isCustom})=>{
            const expanded=expandAbbr(text,lang);
            const isT=/(Therapie|Standard|Erstlinie|First line|Treatment|Alle Patienten|All patient|Leitlinie|Guideline)/.test(expanded);
            const hl=nodeHighlights.has(key);
            return(
              <div key={key} style={{marginBottom:6,position:"relative",display:"flex",alignItems:"flex-start",gap:5}}>
                <button onClick={()=>toggleHighlight(key)}
                  title="Markieren"
                  style={{flexShrink:0,marginTop:6,background:hl?"#f59e0b":"transparent",border:`1px solid ${hl?"#f59e0b":"#2a3460"}`,borderRadius:3,width:14,height:14,cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:hl?"#0a0f20":"#3a4480"}}>
                  {hl?"★":"☆"}
                </button>
                <div style={{flex:1,padding:"7px 10px",
                  background:hl?"rgba(245,158,11,0.12)":isCustom?"rgba(91,141,238,0.08)":isT?`${color}10`:"#0f1628",
                  borderLeft:`2px solid ${hl?"#f59e0b":isCustom?"#5b8dee":isT?color:"#1e2848"}`,
                  borderRadius:"0 4px 4px 0",fontSize:11,lineHeight:1.55,
                  color:hl?"#fde68a":isCustom?"#93c5fd":isT?"#ddeeff":"#aabbd4",
                  boxShadow:hl?"0 0 8px rgba(245,158,11,0.15)":"none"}}>
                  {expanded}
                  {isCustom&&<span style={{fontSize:9,color:"#5b8dee",marginLeft:6,opacity:0.7}}>[custom]</span>}
                </div>
                {editMode&&isCustom&&(
                  <button onClick={()=>removeBullet(key)} title="Löschen"
                    style={{flexShrink:0,marginTop:6,background:"transparent",border:"1px solid #3a1a2a",borderRadius:3,width:14,height:14,cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#cc4455"}}>
                    ×
                  </button>
                )}
                {editMode&&!isCustom&&(
                  <button onClick={()=>removeBullet(key)} title="Ausblenden"
                    style={{flexShrink:0,marginTop:6,background:"transparent",border:"1px solid #2a2a40",borderRadius:3,width:14,height:14,cursor:"pointer",padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#556688",opacity:0.6}}>
                    –
                  </button>
                )}
              </div>
            );
          })}

          {/* add bullet UI */}
          {editMode&&(
            <div style={{marginTop:14,borderTop:"1px solid #1a2448",paddingTop:12}}>
              <div style={{fontSize:9,letterSpacing:"0.18em",color:"#4466aa",marginBottom:6}}>NOTIZ HINZUFÜGEN · ADD NOTE</div>
              <div style={{fontSize:9,color:"#334466",marginBottom:6}}>{lang==="de"?"Wird zu DE + EN hinzugefügt (ohne Übersetzung)":"Added to both DE and EN without translation"}</div>
              <textarea
                value={addInput}
                onChange={e=>setAddInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addBullet();}}}
                placeholder={lang==="de"?"Text eingeben … (Enter = speichern)":"Enter text … (Enter = save)"}
                rows={2}
                style={{width:"100%",boxSizing:"border-box",background:"#0d1424",border:"1px solid #243060",borderRadius:5,color:"#c8d8ff",padding:"6px 8px",fontSize:11,fontFamily:"inherit",resize:"vertical",outline:"none"}}
              />
              <button onClick={addBullet}
                style={{marginTop:6,background:"#1a2848",border:"1px solid #5b8dee",color:"#c8d8ff",borderRadius:5,padding:"4px 14px",cursor:"pointer",fontFamily:"inherit",fontSize:11}}>
                + {lang==="de"?"Hinzufügen":"Add"}
              </button>
            </div>
          )}

          {/* highlight summary */}
          {nodeHighlights.size>0&&(
            <div style={{marginTop:14,borderTop:"1px solid #2a2000",paddingTop:10}}>
              <div style={{fontSize:9,letterSpacing:"0.18em",color:"#b87a00",marginBottom:6}}>
                {lang==="de"?"MARKIERUNGEN":"HIGHLIGHTS"} · {nodeHighlights.size}
              </div>
              {allBullets.filter(b=>nodeHighlights.has(b.key)).map(b=>(
                <div key={b.key} style={{fontSize:10,color:"#fde68a",padding:"4px 0",borderBottom:"1px solid #2a2000",lineHeight:1.4}}>
                  · {expandAbbr(b.text,lang).slice(0,80)}{expandAbbr(b.text,lang).length>80?"…":""}
                </div>
              ))}
            </div>
          )}
        </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
